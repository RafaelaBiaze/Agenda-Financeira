version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ong_financeiro_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: PG_USER
      POSTGRES_PASSWORD: PG_PASSWORD
      POSTGRES_DB: PG_DB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ong
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: PG_ADMIN_EMAIL
      PGADMIN_DEFAULT_PASSWORD: PG_ADMIN_PASSWORD
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data: