version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ong_financeiro_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    ports:
      - "5432:5432"
    networks:
      - backend_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_ong
    restart: always
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_ADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PG_ADMIN_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - backend_network
    depends_on:
      - db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    container_name: agenda_backend
    volumes:
      - .:/app
      - /app/node_modules # Impede que o Windows sobrescreva os módulos do Docker
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/agenda_financeira
      PORT: 3333
    networks:
      - backend_network
      - frontend_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: agenda_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - frontend_network
    depends_on:
      - backend 
        
volumes:
  postgres_data:

networks:
  backend_network:
    driver: bridge
  frontend_network:
    driver: bridge